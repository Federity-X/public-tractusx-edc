# Tractus-X EDC Configuration with Data Masking Extension
# This configuration runs the full Tractus-X stack locally with Docker services

# Identity and Trust Configuration
edc.iam.issuer.id=did:web:localhost

# Data Plane Token Configuration
edc.transfer.proxy.token.signer.privatekey.alias=key-1
edc.transfer.proxy.token.verifier.publickey.alias=key-1

# HTTP Configuration
web.http.port=8080
web.http.path=/api
web.http.control.port=8084
web.http.control.path=/control
web.http.public.port=8081
web.http.public.path=/public
web.http.management.port=8181
web.http.management.path=/management
web.http.management.auth.key=password

# Participant Configuration
edc.participant.id=tractus-x-participant
edc.runtime.id=tractus-x-runtime

# IATP/STS Configuration - Using mock endpoints for local testing
edc.iam.sts.oauth.token.url=http://localhost:8080/mock/token
edc.iam.sts.oauth.client.id=test-clientid
edc.iam.sts.oauth.client.secret.alias=test-clientid-alias
tx.edc.iam.iatp.bdrs.server.url=http://localhost:8080/mock/bdrs

# Data Plane Configuration
edc.dataplane.api.public.baseurl=http://localhost:8081/public/v2/data
tx.edc.dpf.consumer.proxy.port=8186
tx.edc.dpf.consumer.proxy.auth.apikey=password

# Transfer Configuration
edc.transfer.send.retry.limit=1
edc.transfer.send.retry.base-delay.ms=100

# Catalog Configuration
edc.catalog.cache.execution.delay.seconds=5
edc.catalog.cache.execution.period.seconds=10

# Policy Configuration
edc.policy.validation.enabled=true

# Agent Identity Configuration
edc.agent.identity.key=BusinessPartnerNumber

# DSP Configuration
edc.dsp.callback.address=http://localhost:8080/api/protocol

# Vault Configuration
edc.vault.hashicorp.url=http://localhost:8200
edc.vault.hashicorp.token=root

# Database Configuration (PostgreSQL)
edc.datasource.default.url=jdbc:postgresql://localhost:5433/edc
edc.datasource.default.user=user
edc.datasource.default.password=password

# PostgreSQL Migration Schema
org.eclipse.tractusx.edc.postgresql.migration.schema=public

# Data Masking Extension Configuration
edc.datamasking.enabled=true
edc.datamasking.strategy=PARTIAL
edc.datamasking.fields=email,name,firstName,lastName,ssn,phone,creditCard,personalId,taxId,businessPartnerNumber
edc.datamasking.audit.enabled=true

# Logging Configuration
edc.monitor.loglevel=INFO

# Connector Name
edc.connector.name=tractus-x-edc-with-data-masking
