################################################################################
# EDC Secure Configuration - Production Parity for Local Development
# This configuration enforces proper API key authentication and disables
# the permissive delegated authentication behavior.
################################################################################

##################################################################################
# Eclipse Dataspace Connector configuration
##################################################################################
edc.participant.id=BPNL000000000000

edc.iam.issuer.id=did:web:BPNL000000000000:BPNL000000000000

#################################
## Catalog Server and DSP endpoints
#################################

# when hosting the app using docker-compose, use edc.hostname=controlplane else use localhost
edc.hostname=localhost

edc.dsp.callback.address=http://${edc.hostname}:8282/api/v1/dsp
web.http.protocol.port=8282
web.http.protocol.path=/api/v1/dsp

#################################
## Control Plane Configuration
#################################
web.http.management.port=8181
web.http.management.path=/management

#################################
## SECURE AUTHENTICATION CONFIGURATION
#################################
# Production-like API key (replace with secure key in production)
web.http.management.auth.key=secure-development-api-key-2024

# Security headers
web.http.management.cors.enabled=false
web.http.management.cors.headers=

#################################
## Control API Configuration
#################################
web.http.control.port=9999
web.http.control.path=/api/controlplane/control

#################################
## Data Plane Configuration
#################################
edc.dataplane.api.public.baseurl=http://${edc.hostname}:8185/public/
edc.dataplane.token.validation.endpoint=http://localhost:8183/control/token

web.http.public.port=8185
web.http.public.path=/public

web.http.control.port=8183
web.http.control.path=/control

#################################
## Backend service (e.g. CEP) Configuration for Data Source and Data Sink
#################################
edc.dataplane.http.sink.partition.size=5

#################################
## SSI Configuration
#################################
tx.iam.iatp.bdrs.server.url=https://placeholder.org/bdrs-server-url
tx.iam.iatp.bdrs.cache.validity=600
edc.agent.identity.key=
edc.iam.sts.oauth.token.url=https://placeholder.org/token
tx.iam.iatp.sts.oauth.client.id=
tx.iam.iatp.sts.oauth.client.secret.alias=
tx.iam.iatp.sts.dim.url=https://placeholder.org/dim-url

#################################
## Vault Configuration (Dev mode - do not use in production)
#################################
edc.vault.hashicorp.url=http://localhost:8200
edc.vault.hashicorp.token=root
edc.vault.hashicorp.timeout.seconds=30

#################################
## Database Configuration (Dev mode)
#################################
edc.datasource.default.url=jdbc:postgresql://localhost:5433/edc
edc.datasource.default.user=edc_user
edc.datasource.default.password=edc_password

#################################
## Federated Catalog Configuration
#################################
edc.catalog.cache.execution.delay.seconds=5
edc.catalog.cache.execution.period.seconds=60
edc.catalog.cache.partition.num.crawlers=5

#################################
## BPN Validation Configuration
#################################
edc.bpn.validation.log.enabled=true

#################################
## Additional Security Configuration
#################################
# Enable request/response logging for debugging (disable in production)
edc.web.rest.log.enabled=true

# Disable CORS for security
web.http.cors.enabled=false

# Connection timeouts
edc.transfer.proxy.token.validity.seconds=600
edc.transfer.proxy.token.signer.privatekey.alias=
edc.transfer.proxy.token.verifier.publickey.alias=

#################################
## Observability Configuration
#################################
edc.metrics.enabled=true
edc.metrics.system.enabled=true
