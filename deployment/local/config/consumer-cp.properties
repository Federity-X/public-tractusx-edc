#
# Consumer Control Plane — Local Docker Configuration
#
# Identity Hub: consumer-ih (consumer's own wallet)
# Issuer Service: issuerservice (central, on edc-net)
# Database: consumer-postgres:5432/consumer
# Vault: consumer-vault:8200 (shared with consumer-ih, consumer-dp)
#

############################
# IDENTITY / PARTICIPANT   #
############################
edc.participant.id=did:web:consumer-ih:consumer
edc.iam.issuer.id=did:web:consumer-ih:consumer
tractusx.edc.participant.bpn=BPNL000000000002
edc.participant.context.id=consumer

############################
# WEB / HTTP ENDPOINTS     #
############################
web.http.port=8080
web.http.path=/api

web.http.management.port=8081
web.http.management.path=/management
web.http.management.auth.type=tokenbased
web.http.management.auth.key=testkey

web.http.control.port=8083
web.http.control.path=/control

web.http.protocol.port=8084
web.http.protocol.path=/api/v1/dsp

web.http.catalog.port=8085
web.http.catalog.path=/catalog
web.http.catalog.auth.type=tokenbased
web.http.catalog.auth.key=testkey

# DSP callback address — what other connectors use to reach this CP
edc.dsp.callback.address=http://consumer-cp:8084/api/v1/dsp

############################
# DCP / STS CONFIGURATION  #
############################
edc.iam.sts.oauth.token.url=http://consumer-ih:9292/api/sts/token
edc.iam.sts.oauth.client.id=did:web:consumer-ih:consumer
edc.iam.sts.oauth.client.secret.alias=consumer-sts-secret
edc.iam.did.web.use.https=false
edc.agent.identity.key=client_id

############################
# DID SELF-REGISTRATION    #
############################
# Activate IdentityHub client for DID Document service management
tx.edc.did.service.client.type=identityhub
tx.edc.ih.identity.api.url=http://consumer-ih:15151/api/identity
tx.edc.ih.identity.api.key.alias=consumer-ih-api-key
tx.edc.ih.participant.context.id=consumer
# Auto-register DataService endpoint on startup, deregister on shutdown
tx.edc.did.service.self.registration.enabled=true
tx.edc.did.service.self.deregistration.enabled=true
tx.edc.did.service.self.registration.id=did:web:consumer-ih:consumer#DataService

############################
# TRUSTED ISSUER           #
############################
edc.iam.trusted-issuer.issuer.id=did:web:issuerservice:issuer
edc.iam.trusted-issuer.issuer.supportedtypes=["MembershipCredential","BpnCredential","DataExchangeGovernanceCredential"]

############################
# BDRS                     #
############################
tx.edc.iam.iatp.bdrs.server.url=http://bdrs-server:8580/api/directory
tx.edc.iam.iatp.bdrs.cache.validity=600

############################
# DATASOURCE               #
############################
edc.datasource.default.url=jdbc:postgresql://consumer-postgres:5432/consumer_edc
edc.datasource.default.user=consumer
edc.datasource.default.password=consumer
tx.edc.postgresql.migration.enabled=true
tx.edc.postgresql.migration.schema=public

############################
# VAULT                    #
############################
edc.vault.hashicorp.url=http://consumer-vault:8200
edc.vault.hashicorp.token=root
edc.vault.hashicorp.api.secret.path=/v1/secret
edc.vault.hashicorp.health.check.enabled=true
edc.vault.hashicorp.health.check.standby.ok=true

############################
# DATA PLANE SELECTION     #
############################
edc.dataplane.api.public.baseurl=http://consumer-dp:8081/api/public/v2/data

############################
# TRANSFER / PROXY         #
############################
edc.transfer.proxy.token.signer.privatekey.alias=consumer-transfer-proxy-key
edc.transfer.proxy.token.verifier.publickey.alias=consumer-transfer-proxy-key
edc.transfer.send.retry.limit=3
edc.transfer.send.retry.base-delay.ms=500

############################
# CONSUMER PROXY           #
############################
tx.edc.dpf.consumer.proxy.port=8186
tx.edc.dpf.consumer.proxy.auth.apikey=proxykey

############################
# POLICY                   #
############################
edc.policy.validation.enabled=true
tractusx.businesspartnervalidation.log.agreement.validation=true

############################
# REVOCATION               #
############################
edc.iam.credential.revocation.mimetype=application/json
