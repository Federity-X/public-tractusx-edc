#
# Consumer Identity Hub (Wallet) — Local Docker Configuration
#
# This IdentityHub runs as part of the consumer company's stack.
# Vault: consumer-vault:8200 (shared with consumer-cp, consumer-dp)
# Database: consumer-postgres:5432/consumer (shared with consumer-cp, consumer-dp)
#

###########################
# ENDPOINTS CONFIGURATION #
###########################
web.http.port=8181
web.http.path=/api
web.http.default.port=8181
web.http.default.path=/api

web.http.version.port=7171
web.http.version.path=/.well-known/api

web.http.credentials.port=13131
web.http.credentials.path=/api/credentials

web.http.did.port=80
web.http.did.path=/

web.http.identity.port=15151
web.http.identity.path=/api/identity

web.http.sts.port=9292
web.http.sts.path=/api/sts

############################
# STS / IAM CONFIGURATION  #
############################
edc.iam.sts.token.expiration=5
edc.iam.accesstoken.jti.validation=false
edc.iam.credential.revocation.cache.validity=900000
edc.iam.credential.revocation.mimetype=*
edc.iam.did.web.use.https=false

# Credential watchdog
edc.iam.credential.status.check.period=60
edc.iam.credential.status.check.delay=5
edc.iam.credential.renewal.graceperiod=604800

############################
# SUPER-USER CONFIGURATION #
############################
edc.ih.api.superuser.id=super-user
edc.ih.api.superuser.key=c3VwZXItdXNlcg==.superuserkey

#################################
# VAULT HASHICORP CONFIGURATION #
#################################
edc.vault.hashicorp.url=http://consumer-vault:8200
edc.vault.hashicorp.token=root
edc.vault.hashicorp.token.scheduled-renew-enabled=false
edc.vault.hashicorp.token.ttl=300
edc.vault.hashicorp.token.renew-buffer=30

############################
# DATASOURCE CONFIGURATION #
############################
edc.datasource.default.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.default.user=consumer
edc.datasource.default.password=consumer

edc.datasource.stsclient.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.stsclient.user=consumer
edc.datasource.stsclient.password=consumer
edc.sql.store.stsclient.datasource=default

edc.datasource.didresource.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.didresource.user=consumer
edc.datasource.didresource.password=consumer
edc.sql.store.didresource.datasource=default

edc.datasource.participantcontext.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.participantcontext.user=consumer
edc.datasource.participantcontext.password=consumer
edc.sql.store.participantcontext.datasource=default

edc.datasource.participantcontextconfig.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.participantcontextconfig.user=consumer
edc.datasource.participantcontextconfig.password=consumer
edc.sql.store.participantcontextconfig.datasource=default

edc.datasource.credentials.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.credentials.user=consumer
edc.datasource.credentials.password=consumer
edc.sql.store.credentials.datasource=default

edc.datasource.credentialrequest.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.credentialrequest.user=consumer
edc.datasource.credentialrequest.password=consumer
edc.sql.store.credentialrequest.datasource=default

edc.datasource.keypair.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.keypair.user=consumer
edc.datasource.keypair.password=consumer
edc.sql.store.keypair.datasource=default

edc.datasource.jti.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.jti.user=consumer
edc.datasource.jti.password=consumer
edc.sql.store.jti.datasource=default

edc.datasource.holder.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.holder.user=consumer
edc.datasource.holder.password=consumer
edc.sql.store.holder.datasource=default

edc.datasource.attestationdefinitions.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.attestationdefinitions.user=consumer
edc.datasource.attestationdefinitions.password=consumer

edc.datasource.credentialdefinitions.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.credentialdefinitions.user=consumer
edc.datasource.credentialdefinitions.password=consumer

edc.datasource.issuanceprocess.url=jdbc:postgresql://consumer-postgres:5432/consumer
edc.datasource.issuanceprocess.user=consumer
edc.datasource.issuanceprocess.password=consumer

edc.sql.store.issuanceprocess.datasource=default
edc.sql.store.credentialdefinitions.datasource=default
edc.sql.store.attestationdefinitions.datasource=default

###############################
# EDC CONNECTOR CONFIGURATION #
###############################
edc.jsonld.vocab.disable=false
edc.jsonld.prefixes.check=true
edc.jsonld.http.enabled=false
edc.jsonld.https.enabled=false
