#
# Provider Control Plane — Local Docker Configuration
#
# Identity Hub: provider-ih (provider's own wallet)
# Issuer Service: issuerservice (central, on edc-net)
# Database: provider-postgres:5432/provider
# Vault: provider-vault:8200 (shared with provider-ih, provider-dp)
#

############################
# IDENTITY / PARTICIPANT   #
############################
edc.participant.id=did:web:provider-ih:provider
edc.iam.issuer.id=did:web:provider-ih:provider
tractusx.edc.participant.bpn=BPNL000000000001
edc.participant.context.id=provider

############################
# WEB / HTTP ENDPOINTS     #
############################
web.http.port=8080
web.http.path=/api

web.http.management.port=8081
web.http.management.path=/management
web.http.management.auth.type=tokenbased
web.http.management.auth.key=testkey

web.http.control.port=8083
web.http.control.path=/control

web.http.protocol.port=8084
web.http.protocol.path=/api/v1/dsp

web.http.catalog.port=8085
web.http.catalog.path=/catalog
web.http.catalog.auth.type=tokenbased
web.http.catalog.auth.key=testkey

# DSP callback address — what other connectors use to reach this CP
edc.dsp.callback.address=http://provider-cp:8084/api/v1/dsp

############################
# DCP / STS CONFIGURATION  #
############################
# STS — obtain SI tokens from provider's own IdentityHub
edc.iam.sts.oauth.token.url=http://provider-ih:9292/api/sts/token
edc.iam.sts.oauth.client.id=did:web:provider-ih:provider
edc.iam.sts.oauth.client.secret.alias=provider-sts-secret

# DCP credential endpoint — for requesting VPs from provider's IdentityHub
#tx.edc.iam.sts.dim.url=http://provider-ih:13131/api/credentials

# DID resolution (no HTTPS for local dev)
edc.iam.did.web.use.https=false

# Agent identity key — DCP uses client_id
edc.agent.identity.key=client_id

############################
# TRUSTED ISSUER           #
############################
edc.iam.trusted-issuer.issuer.id=did:web:issuerservice:issuer
edc.iam.trusted-issuer.issuer.supportedtypes=["MembershipCredential","BpnCredential","DataExchangeGovernanceCredential"]

############################
# BDRS                     #
############################
tx.edc.iam.iatp.bdrs.server.url=http://bdrs-server:8580/api/directory
tx.edc.iam.iatp.bdrs.cache.validity=600

############################
# DATASOURCE               #
############################
edc.datasource.default.url=jdbc:postgresql://provider-postgres:5432/provider_edc
edc.datasource.default.user=provider
edc.datasource.default.password=provider
tx.edc.postgresql.migration.enabled=true
tx.edc.postgresql.migration.schema=public

############################
# DID SELF-REGISTRATION     #
############################
# IdentityHub-based DID document service client
tx.edc.ih.api.url=http://provider-ih:15151/api/identity
tx.edc.ih.api.key=c3VwZXItdXNlcg==.superuserkey
tx.edc.ih.participant.context.id=provider
# Auto-register DataService endpoint in DID document on startup
tx.edc.did.service.self.registration.enabled=true
tx.edc.did.service.self.registration.id=dsp-endpoint
tx.edc.did.service.self.deregistration.enabled=true

############################
# VAULT                    #
############################
edc.vault.hashicorp.url=http://provider-vault:8200
edc.vault.hashicorp.token=root
edc.vault.hashicorp.api.secret.path=/v1/secret
edc.vault.hashicorp.health.check.enabled=true
edc.vault.hashicorp.health.check.standby.ok=true

############################
# DATA PLANE SELECTION     #
############################
edc.dataplane.api.public.baseurl=http://provider-dp:8081/api/public/v2/data

############################
# TRANSFER / PROXY         #
############################
edc.transfer.proxy.token.signer.privatekey.alias=provider-transfer-proxy-key
edc.transfer.proxy.token.verifier.publickey.alias=provider-transfer-proxy-key
edc.transfer.send.retry.limit=3

############################
# LOGGING                  #
############################
edc.core.system.health.check.liveness-period=30
edc.core.monitor.level=DEBUG
edc.transfer.send.retry.base-delay.ms=500

############################
# POLICY                   #
############################
edc.policy.validation.enabled=true
tractusx.businesspartnervalidation.log.agreement.validation=true

############################
# REVOCATION               #
############################
edc.iam.credential.revocation.mimetype=application/json

############################
# VP CACHE                  #
############################
#tx.edc.dcp.cache.enabled=false
